name: Build and Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave empty to use package.json)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: 'false'
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-x64
            os: macos-13
            artifact: latte-darwin-x64
          - platform: darwin-arm64
            os: macos-latest
            artifact: latte-darwin-arm64
          - platform: linux-x64
            os: ubuntu-latest
            artifact: latte-linux-x64
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            artifact: latte-linux-arm64
          - platform: win32-x64
            os: windows-latest
            artifact: latte-win32-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun run build

      - name: Rename binary (Unix)
        if: matrix.platform != 'win32-x64'
        run: cp ./latte ./${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.platform == 'win32-x64'
        run: Copy-Item -Path ./latte.exe -Destination ./${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./${{ matrix.artifact }}

  publish:
    name: Publish to NPM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/binaries
          merge-multiple: true

      - name: List binaries
        run: ls -la ./dist/binaries

      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --dry-run"
          fi
          bun run ./scripts/publish-npm.ts --binary-dir ./dist/binaries $EXTRA_ARGS
